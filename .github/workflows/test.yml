name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

      - name: Smoke test CLI
        run: |
          echo "Testing --help..."
          node bin/cli.js --help
          echo "Testing --version..."
          node bin/cli.js --version
          echo "Testing --analytics on a real URL..."
          node bin/cli.js https://stripe.com --analytics | grep "Brand Voice Profile"
